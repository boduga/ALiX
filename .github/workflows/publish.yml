name: Publish to npm

on:
  push:
    tags:
      - "v*"

# P4.3-Sf.4: Least-privilege — id-token only for provenance, contents:write for release
permissions:
  contents: write       # needed for GitHub release
  id-token: write        # needed for npm provenance
  actions: read          # needed for artifact download

jobs:
  # ── Phase 1: Build, test, pack, verify ───────────────────────────────
  build-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tarball-name: ${{ steps.pack.outputs.tarball }}
    steps:
      # actions/checkout v4 — pinned to SHA
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # pnpm/action-setup v2 — install pnpm before setup-node for cache:pnpm
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      # actions/setup-node v4 — pinned to SHA
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      # Sf.7 step 1: Install approved dependencies
      - run: pnpm install --frozen-lockfile

      # Ensure tag matches package.json version
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match package.json '$PACKAGE_VERSION'"
            exit 1
          fi
          echo "VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Version $PACKAGE_VERSION — OK"

      # Sf.7 step 2: Build and test
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Unit tests
        run: pnpm test:unit:node
      - name: Integration tests
        run: pnpm test:integration

      # Sf.7 step 3: pnpm pack --json
      - name: Pack (Sf.7 step 3)
        id: pack
        run: |
          TARBALL="$(pnpm pack --json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0].filename" 2>/dev/null)"
          echo "Tarball: $TARBALL"
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      # Sf.7 step 4: Verify package contents
      - name: Verify tarball contents (Sf.7 step 4)
        run: |
          if [ -f "${{ steps.pack.outputs.tarball }}" ]; then
            node dist/src/cli.js security supply-chain verify-tarball "${{ steps.pack.outputs.tarball }}" --json
          else
            echo "ERROR: Tarball not found"
            exit 1
          fi

      # Sf.7 step 5-6: Install tarball in clean temp dir and run smoke tests
      - name: Smoke test tarball (Sf.7 steps 5-6)
        run: |
          TARBALL="${{ steps.pack.outputs.tarball }}"
          TMP_DIR="$(mktemp -d)"
          echo "Installing tarball into $TMP_DIR"
          if pnpm install --prefix "$TMP_DIR" "$PWD/$TARBALL" > /dev/null 2>&1; then
            if (cd "$TMP_DIR" && ./node_modules/.bin/alix init > /dev/null 2>&1 && \
                ./node_modules/.bin/alix doctor > /dev/null 2>&1 && \
                ./node_modules/.bin/alix models doctor --json > /dev/null 2>&1); then
              echo "Smoke test passed"
            else
              echo "ERROR: Smoke test failed"
              exit 1
            fi
          else
            echo "ERROR: Tarball install failed"
            exit 1
          fi
          rm -rf "$TMP_DIR"

      # Sf.7 step 7: Generate SBOM
      - name: Generate SBOM (Sf.7 step 7)
        run: |
          npm sbom -- --json > "${{ steps.pack.outputs.tarball }}.sbom.json" 2>/dev/null || echo "{}" > "${{ steps.pack.outputs.tarball }}.sbom.json"
          echo "SBOM generated: ${{ steps.pack.outputs.tarball }}.sbom.json"

      # Sf.7 step 8: Compute checksum
      - name: Compute checksum (Sf.7 step 8)
        run: |
          sha256sum "${{ steps.pack.outputs.tarball }}" > "${{ steps.pack.outputs.tarball }}.sha256"
          echo "Checksum: $(cat ${{ steps.pack.outputs.tarball }}.sha256)"

      # Sf.7 step 9: Upload tarball, SBOM, checksum as workflow artifacts
      # actions/upload-artifact v4 — pinned to SHA
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sbom.json
            ${{ steps.pack.outputs.tarball }}.sha256
          retention-days: 7

  # ── Phase 2: Publish from artifact (not source tree) ─────────────────
  publish:
    needs: build-and-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed for GitHub release
      id-token: write        # needed for npm provenance
      actions: read          # needed for artifact download
    steps:
      # actions/checkout v4 — pinned to SHA
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # actions/setup-node v4 — pinned to SHA
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Download the exact tarball that passed the release gate
      # actions/download-artifact v4 — pinned to SHA
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts

      - name: Verify checksum before publish (Sf.7 step 10)
        run: |
          TARBALL="$(ls alix-*.tgz | head -1)"
          if [ -z "$TARBALL" ]; then
            echo "ERROR: No tarball found in artifacts"
            exit 1
          fi
          echo "Verifying checksum for $TARBALL"
          sha256sum -c "$TARBALL.sha256" || {
            echo "ERROR: Checksum verification FAILED"
            exit 1
          }
          echo "Checksum verified — OK"
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      # Sf.7 step 10: Publish from artifact (exact tarball, with provenance)
      - name: Publish to npm (Sf.7 step 10)
        run: npm publish "$TARBALL" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Find SBOM and checksum file
      - name: Identify artifact files
        id: artifact-files
        run: |
          SBOM_FILE="$(ls *.sbom.json 2>/dev/null | head -1 || echo "")"
          CHECKSUM_FILE="$(ls *.sha256 2>/dev/null | head -1 || echo "")"
          echo "sbom=$SBOM_FILE" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM_FILE" >> $GITHUB_OUTPUT

      # Sf.7 step 11: Create GitHub release with tarball, SBOM, checksum
      - name: Create GitHub release with artifacts (Sf.7 step 11)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=("$TARBALL")
          [ -n "${{ steps.artifact-files.outputs.sbom }}" ] && [ -f "${{ steps.artifact-files.outputs.sbom }}" ] && ASSETS+=("${{ steps.artifact-files.outputs.sbom }}")
          [ -n "${{ steps.artifact-files.outputs.checksum }}" ] && [ -f "${{ steps.artifact-files.outputs.checksum }}" ] && ASSETS+=("${{ steps.artifact-files.outputs.checksum }}")

          echo "Release assets: ${ASSETS[*]}"

          # Create the release with assets
          gh release create "${GITHUB_REF_NAME}" \
            "${ASSETS[@]}" \
            --generate-notes \
            --title "ALiX ${GITHUB_REF_NAME}"
