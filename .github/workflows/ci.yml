name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests (excluding interactive manual tests)
        run: |
          find dist/tests -name "*.test.js" ! -path "dist/tests/manual/*" -print0 | xargs -0 node --test

      - name: Run integration smoke tests
        run: node --test dist/tests/integration/smoke.test.js

      - name: Run TUI manual smoke (non-blocking)
        run: node --test --test-concurrency=1 dist/tests/manual/suite-p-tui-smoke.test.js
        continue-on-error: true

      - name: Verify build is doctorable
        run: node dist/src/cli.js doctor
