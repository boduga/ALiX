name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run CI unit tests (excluding interactive manual)
        run: npm run test:node:ci

      - name: Run vitest
        run: npm run test:vitest

      - name: Run integration smoke tests
        run: node --test dist/tests/integration/smoke.test.js

      - name: Run TUI manual smoke (non-blocking)
        run: npm run test:manual:tui
        continue-on-error: true

      - name: Verify build is doctorable
        run: node dist/src/cli.js doctor
