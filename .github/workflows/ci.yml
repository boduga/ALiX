name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: node --test dist/tests/*.test.js dist/tests/**/*.test.js

      - name: Run integration smoke tests
        run: node --test dist/tests/integration/smoke.test.js

      - name: Verify build is doctorable
        run: node dist/src/cli.js doctor
