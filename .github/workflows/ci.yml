name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# P4.3-Sf.4: Explicit least-privilege permissions
permissions:
  contents: read

jobs:
  # ─── Lane 0: Supply-chain check (first gate) ──────────────────────────
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v4 — pinned to SHA
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # actions/setup-node v4 — pinned to SHA
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lifecycle script check (Sf.1)
        run: node scripts/verify-lifecycle-scripts.mjs
      - name: Lockfile integrity (Sf.3)
        run: |
          if ! git diff --exit-code package-lock.json; then
            echo "ERROR: package-lock.json has uncommitted changes"
            exit 1
          fi
          echo "Lockfile clean — OK"
      - name: Supply-chain gate (Sf.x)
        run: bash scripts/check-supply-chain.sh

  # ─── Lane 1: TypeScript typecheck (fast, no build needed) ─────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck

  # ─── Lane 2: Unit tests (vitest) ──────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Vitest
        run: npm run test:vitest

  # ─── Lane 3: Integration + Soak Tier 1 + Doctor ───────────────────────
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Integration tests
        run: npm run test:integration
      - name: Soak Tier 1 (corruption + store load)
        run: npm run test:soak:quick
      - name: Doctor health check
        run: node dist/src/cli.js doctor

  # ─── Lane 4: TUI smoke (blocking) ─────────────────────────────────────
  tui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: TUI manual smoke
        run: npm run test:manual:tui

  # ─── Lane 5: Cross-platform — macOS (Node LTS + current) ──────────────
  unit-macos:
    strategy:
      matrix:
        node-version: ["22", "24"]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: TypeScript typecheck
        run: npm run typecheck

  # ─── Lane 6: Cross-platform — Windows (Node LTS) ──────────────────────
  unit-windows:
    strategy:
      matrix:
        node-version: ["22"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build
        shell: bash
        run: npm run build
      - name: TypeScript typecheck
        shell: bash
        run: npm run typecheck
