name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# P4.3-Sf.4: Explicit least-privilege permissions
permissions:
  contents: read

jobs:
  # ─── Lane 0: Supply-chain check (first gate) ──────────────────────────
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v4 — pinned SHA
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # pnpm/action-setup v2 — install pnpm before setup-node for cache:pnpm
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      # actions/setup-node v4 — pinned SHA
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lifecycle script check (Sf.1)
        run: node scripts/verify-lifecycle-scripts.mjs
      - name: Lockfile integrity (Sf.3)
        run: |
          if ! git diff --exit-code pnpm-lock.yaml; then
            echo "ERROR: pnpm-lock.yaml has uncommitted changes"
            exit 1
          fi
          echo "Lockfile clean — OK"
      - name: Package manager policy check
        run: bash scripts/check-package-manager.sh
      - name: Supply-chain gate (Sf.x)
        run: bash scripts/check-supply-chain.sh

  # ─── Lane 1: TypeScript typecheck (fast, no build needed) ─────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript typecheck
        run: pnpm typecheck

  # ─── Lane 2: Unit tests (vitest) ──────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Vitest
        run: pnpm test:vitest

  # ─── Lane 7: Live provider model-list validation ─────────────────────────
  # Runs after `unit`. Per-provider `describe.skipIf(!env.X)` in
  # tests/cli/helpers/init-live.vitest.ts gates each suite individually
  # (spec §17). Job runs even without secrets — empty envs simply skip.
  test-live:
    needs: unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Live provider model list validation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: pnpm test:vitest -- tests/cli/helpers/init-live.vitest.ts

  # ─── Lane 3: Integration + Soak Tier 1 + Doctor ───────────────────────
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Integration tests
        run: pnpm test:integration
      - name: Soak Tier 1 (corruption + store load)
        run: pnpm test:soak:quick
      - name: Doctor health check
        run: node dist/src/cli.js doctor

  # ─── Lane 4: TUI smoke (blocking) ─────────────────────────────────────
  tui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: TUI manual smoke
        run: pnpm test:manual:tui

  # ─── Lane 5: Cross-platform — macOS (Node LTS + current) ──────────────
  unit-macos:
    strategy:
      matrix:
        node-version: ["22", "24"]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: TypeScript typecheck
        run: pnpm typecheck

  # ─── Lane 6: Cross-platform — Windows (Node LTS) ──────────────────────
  unit-windows:
    strategy:
      matrix:
        node-version: ["22"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        shell: bash
        run: pnpm build
      - name: TypeScript typecheck
        shell: bash
        run: pnpm typecheck
