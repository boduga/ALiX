name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lane 1: TypeScript typecheck (fast, no build needed) ──────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck

  # ─── Lane 2: Unit tests (node + vitest) ─────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Node unit tests
        run: npm run test:unit:node
      - name: Vitest
        run: npm run test:vitest

  # ─── Lane 3: Integration + Soak Tier 1 + Doctor ────────────────
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Integration tests
        run: npm run test:integration
      - name: Soak Tier 1 (corruption + store load)
        run: npm run test:soak:quick
      - name: Doctor health check
        run: node dist/src/cli.js doctor

  # ─── Lane 4: TUI smoke (blocking) ──────────────────────────────
  tui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: TUI manual smoke
        run: npm run test:manual:tui
